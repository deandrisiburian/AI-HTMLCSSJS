<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EpanD AI - Chat</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="logo">EpanD AI</div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="login.html">Login</a>
                <a href="chat.html" class="active">Chat</a>
                <a href="settings.html">Settings</a>
            </div>
            <div class="user-info" id="userInfo">
                <span id="username"></span>
                <button onclick="logout()" class="btn-logout">Logout</button>
            </div>
        </nav>

        <div class="chat-container">
            <div class="chat-sidebar">
                <div class="model-selector">
                    <label for="modelSelect">Pilih Model:</label>
                    <select id="modelSelect" class="model-select">
                        <option value="nvidia/nemotron-nano-9b-v2:free">Nemotron Nano 9B v2</option>
                        <option value="nvidia/nemotron-nano-12b-v2-vl:free">Nemotron Nano 12B 2 VL</option>
                        <option value="nvidia/nemotron-3-nano-30b-a3b:free">Nemotron 3 Nano 30B A3B</option>
                    </select>
                </div>
                <button onclick="newChat()" class="btn btn-secondary btn-full">New Chat</button>
            </div>

            <div class="chat-main">
                <div class="chat-messages" id="chatMessages">
                    <div class="message ai-message">
                        <div class="message-content">
                            Halo! Saya asisten AI EpanD. Ada yang bisa saya bantu?
                        </div>
                    </div>
                </div>

                <div class="chat-input-area">
                    <textarea id="userInput" placeholder="Ketik pesan Anda..." rows="3"></textarea>
                    <button onclick="sendMessage()" class="btn btn-primary">Kirim</button>
                </div>
            </div>
        </div>
    </div>
    <script src="config/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
