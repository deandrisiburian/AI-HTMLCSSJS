<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EpanD AI - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="animated-bg">
        <div class="gradient-orb"></div>
        <div class="gradient-orb"></div>
        <div class="gradient-orb"></div>
    </div>

    <!-- Mobile Menu Overlay -->
    <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>

    <div class="container">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="logo">EpanD AI</div>
            
            <!-- Hamburger Menu Button -->
            <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <!-- Navigation Links -->
            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="login.html" class="active">Login</a>
                <a href="chat.html">Chat</a>
                <a href="settings.html">Settings</a>
                
                <!-- Mobile User Info (hidden on login page) -->
                <div class="mobile-user-info" id="mobileUserInfo" style="display: none;">
                    <span id="mobileUsername"></span>
                    <button onclick="logout()" class="btn-logout">Logout</button>
                </div>
            </div>

            <!-- Desktop User Info (hidden on login page) -->
            <div class="user-info desktop-only" id="userInfo" style="display: none;">
                <span id="usernameDisplay"></span>
                <button onclick="logout()" class="btn-logout">Logout</button>
            </div>
        </nav>

        <!-- Login Content -->
        <div class="login-container">
            <div class="login-box glass-liquid">
                <h2>Login ke EpanD AI</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="Masukkan username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Masukkan password" required>
                    </div>
                    <div class="error-message" id="loginError"></div>
                    
                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" id="rememberMe">
                            <span class="checkmark"></span>
                            Ingat saya
                        </label>
                        <a href="#" class="forgot-password">Lupa password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">Login</button>
                </form>

                </div>

                <div class="register-link">
                    Belum punya akun? <a href="wa.me/6283875950270">Hubungi Admin</a>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 EpanD AI. All rights reserved.</p>
        </footer>
    </div>

    <script src="config/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
